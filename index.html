<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIS Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a3a6b;--primary-dark:#0f2444;--accent:#2563eb;--gold:#f59e0b;--white:#fff;--cream:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g400:#94a3b8;--g600:#475569;--g800:#1e293b;--red:#ef4444;--rad:12px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--g800);min-height:100vh;}

/* HEADER */
header{background:#fff;border-bottom:1px solid var(--g200);position:sticky;top:0;z-index:100;}
.hdr{max-width:1200px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-img{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.logo-text{font-size:1.2rem;font-weight:700;color:var(--g800);}
.hdr-search{flex:1;max-width:400px;position:relative;}
.hdr-search input{width:100%;padding:9px 16px 9px 38px;border:1.5px solid var(--g200);border-radius:8px;font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;background:var(--g100);color:var(--g800);transition:all .2s;}
.hdr-search input:focus{border-color:var(--accent);background:#fff;}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:.95rem;pointer-events:none;}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cart-btn{display:flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:none;padding:9px 18px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap;}
.cart-btn:hover{background:var(--primary-dark);}
.cart-badge{background:var(--gold);color:var(--primary-dark);border-radius:20px;padding:1px 7px;font-size:.75rem;font-weight:700;min-width:20px;text-align:center;}
.myorder-btn{background:none;border:1.5px solid var(--g200);color:var(--g600);padding:7px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;}
.myorder-btn:hover{border-color:var(--primary);color:var(--primary);}

/* LANG */
.lang-wrap{position:relative;}
.lang-btn{display:flex;align-items:center;gap:6px;background:var(--g100);color:var(--g800);border:1.5px solid var(--g200);padding:7px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.lang-btn:hover{border-color:var(--primary);color:var(--primary);}
.lang-drop{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1.5px solid var(--g200);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);overflow:hidden;min-width:130px;z-index:200;display:none;}
.lang-drop.open{display:block;}
.lang-opt{padding:10px 16px;font-size:.88rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;color:var(--g800);}
.lang-opt:hover{background:var(--g100);}
.lang-opt.active{color:var(--primary);font-weight:700;}

/* HERO */
.hero{background:linear-gradient(135deg,var(--primary) 0%,#1e4d9e 100%);position:relative;overflow:hidden;}
.hero-cover{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:.18;}
.hero-inner{max-width:1200px;margin:0 auto;padding:48px 20px;position:relative;z-index:1;}
.hero-logo{width:72px;height:72px;border-radius:16px;object-fit:cover;border:3px solid rgba(255,255,255,.3);margin-bottom:16px;background:#fff;display:block;}
.hero h1{font-size:2.2rem;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.5px;}
.hero p{color:rgba(255,255,255,.75);font-size:.95rem;max-width:440px;line-height:1.6;}

/* CAT BAR */
.cat-bar{background:#fff;border-bottom:1px solid var(--g200);position:sticky;top:64px;z-index:90;}
.cat-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.cat-inner::-webkit-scrollbar{display:none;}
.cat-tab{padding:14px 18px;border:none;background:none;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;color:var(--g600);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px;}
.cat-tab:hover{color:var(--accent);}
.cat-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:40px 20px 60px;}
.section{margin-bottom:52px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--g200);}
.sec-title{font-size:1.3rem;font-weight:700;color:var(--g800);}
.view-all{font-size:.85rem;font-weight:600;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;}

/* PRODUCT GRID */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.pcard{background:#fff;border-radius:var(--rad);border:1px solid var(--g200);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 4px 12px rgba(0,0,0,.12),0 8px 32px rgba(0,0,0,.1);}
.cimg-wrap{position:relative;background:#f8fafc;aspect-ratio:1;overflow:hidden;}
.cimg{width:100%;height:100%;object-fit:contain;padding:6px;transition:transform .3s;}
.pcard:hover .cimg{transform:scale(1.04);}
.out-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);color:#fff;font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
  .low-badge{position:absolute;top:10px;right:10px;background:#f59e0b;color:#fff;font-size:.7rem;font-weight:600;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
.cbody{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px;}
.cname{font-size:.95rem;font-weight:600;color:var(--g800);line-height:1.3;}
.cprice{font-size:1rem;font-weight:700;color:var(--primary);}
.cprice .from{font-size:.75rem;font-weight:400;color:var(--g400);margin-right:2px;}
.see-btn{margin-top:auto;width:100%;padding:9px;border-radius:8px;border:1.5px solid var(--g200);background:var(--g100);font-family:'Inter',sans-serif;font-size:.85rem;font-weight:600;color:var(--g800);cursor:pointer;transition:all .15s;text-align:center;}
.see-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary);}
.no-res{text-align:center;padding:60px 20px;color:var(--g400);grid-column:1/-1;}
.no-res .ni{font-size:2.5rem;margin-bottom:12px;}

/* PRODUCT MODAL */
.overlay{position:fixed;inset:0;background:rgba(15,36,68,.55);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
@media(min-width:640px){.overlay{align-items:center;padding:20px;}}
.pmodal{background:#fff;width:100%;max-width:560px;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.34,1.4,.64,1);position:relative;}
@media(min-width:640px){.pmodal{border-radius:20px;animation:popIn .3s cubic-bezier(.34,1.4,.64,1);}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mdrag{width:40px;height:4px;background:var(--g200);border-radius:4px;margin:12px auto 0;}
.mimg-wrap{background:#f8fafc;aspect-ratio:4/3;overflow:hidden;}
.mimg{width:100%;height:100%;object-fit:contain;transition:opacity .2s;}
.thumbs{display:flex;gap:8px;padding:10px 20px 0;overflow-x:auto;scrollbar-width:none;}
.thumbs::-webkit-scrollbar{display:none;}
.thumb{width:60px;height:60px;border-radius:6px;object-fit:cover;cursor:pointer;border:2px solid transparent;flex-shrink:0;opacity:.6;transition:all .15s;}
.thumb.active{border-color:var(--primary);opacity:1;}
.thumb:hover{opacity:1;}
.mbody{padding:20px 24px 28px;}
.mname{font-size:1.3rem;font-weight:700;margin-bottom:4px;}
.mprice{font-size:1.6rem;font-weight:800;color:var(--primary);margin-bottom:20px;}
.opt-lbl{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g600);margin-bottom:10px;display:block;}
.szgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.szpill{padding:7px 14px;border-radius:8px;border:1.5px solid var(--g200);background:#fff;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s;color:var(--g800);}
.szpill:hover:not(.dis){border-color:var(--primary);color:var(--primary);}
.szpill.sel{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;}
.szpill.dis{opacity:.35;cursor:not-allowed;text-decoration:line-through;}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.qty-ctrl{display:flex;align-items:center;gap:12px;background:var(--g100);border-radius:8px;padding:4px 8px;}
.qty-btn{width:30px;height:30px;border:none;background:none;cursor:pointer;font-size:1.2rem;color:var(--g800);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .15s;font-weight:700;line-height:1;}
.qty-btn:hover{background:var(--g200);}
.qty-num{font-size:1rem;font-weight:600;min-width:24px;text-align:center;}
.add-btn{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;}
.add-btn:hover{background:var(--primary-dark);}
.add-btn:disabled{background:var(--g200);color:var(--g400);cursor:not-allowed;}
.mcls{position:absolute;top:16px;right:16px;width:36px;height:36px;background:rgba(255,255,255,.9);border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);z-index:10;}
.mcls:hover{background:#fff;}

/* CARD CAROUSEL ARROWS */
.carr-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.92);border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:5;opacity:0;transition:opacity .18s;color:var(--g800);line-height:1;}
.cimg-wrap:hover .carr-btn{opacity:1;}
@media(hover:none){.carr-btn{opacity:1;}}
.carr-btn.carr-l{left:6px;}
.carr-btn.carr-r{right:6px;}
.carr-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5;pointer-events:none;}
.carr-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.45);transition:background .2s;}
.carr-dot.active{background:#fff;}

/* MODAL IMAGE ARROWS */
.mimg-wrap{position:relative;}
.marr-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.92);border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.18);z-index:5;color:var(--g800);transition:background .15s;line-height:1;}
.marr-btn:hover{background:#fff;}
.marr-btn.marr-l{left:12px;}
.marr-btn.marr-r{right:12px;}

/* CART */
.cart-ov{position:fixed;inset:0;background:rgba(15,36,68,.5);z-index:300;display:none;}
.cart-ov.open{display:block;}
.cart-drw{position:fixed;right:-480px;top:0;width:100%;max-width:420px;height:100%;background:#fff;z-index:301;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.12);}
.cart-drw.open{right:0;}
.cart-hdr{padding:20px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;}
.cart-hdr h2{font-size:1.1rem;font-weight:700;}
.drw-cls{width:32px;height:32px;border:none;background:var(--g100);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--g600);}
.cart-body{flex:1;overflow-y:auto;padding:16px 20px;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--g400);}
.cart-empty .ei{font-size:3rem;margin-bottom:12px;}
.ci{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--g200);}
.ci-img{width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--g100);flex-shrink:0;}
.ci-info{flex:1;}
.ci-name{font-size:.9rem;font-weight:600;margin-bottom:3px;}
.ci-meta{font-size:.8rem;color:var(--g400);margin-bottom:8px;}
.ci-bot{display:flex;align-items:center;justify-content:space-between;}
.ci-price{font-size:.95rem;font-weight:700;color:var(--primary);}
.mq{display:flex;align-items:center;gap:6px;}
.mq-btn{width:26px;height:26px;border:1.5px solid var(--g200);border-radius:6px;background:#fff;cursor:pointer;font-size:.9rem;font-weight:700;color:var(--g800);display:flex;align-items:center;justify-content:center;transition:all .15s;}
.mq-btn:hover{border-color:var(--primary);color:var(--primary);}
.mq-n{font-size:.85rem;font-weight:600;min-width:18px;text-align:center;}
.cart-ftr{padding:16px 20px;border-top:1px solid var(--g200);background:var(--g100);}
.cart-tot{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cart-tot-lbl{font-size:.85rem;font-weight:600;color:var(--g600);}
.cart-tot-val{font-size:1.4rem;font-weight:800;color:var(--primary);}
.checkout-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:8px;transition:background .2s;}
.checkout-btn:hover{background:var(--primary-dark);}
.clr-btn{width:100%;padding:10px;background:none;border:1px solid var(--g200);border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--g400);cursor:pointer;transition:all .15s;}
.clr-btn:hover{border-color:var(--red);color:var(--red);}

/* ORDER MODAL */
.ord-ov{position:fixed;inset:0;background:rgba(15,36,68,.6);z-index:400;display:none;align-items:center;justify-content:center;padding:20px;}
.ord-ov.open{display:flex;}
.ord-modal{background:#fff;border-radius:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:popIn .3s cubic-bezier(.34,1.4,.64,1);}
.ord-hdr{padding:24px 24px 16px;border-bottom:1px solid var(--g200);}
.ord-hdr h2{font-size:1.2rem;font-weight:700;margin-bottom:4px;}
.ord-hdr p{font-size:.85rem;color:var(--g400);}
.ord-body{padding:20px 24px 24px;}
.ord-items{background:var(--g100);border-radius:10px;padding:14px;margin-bottom:20px;}
.orow{display:flex;justify-content:space-between;font-size:.85rem;padding:5px 0;}
.orow.tot{border-top:1px solid var(--g200);margin-top:8px;padding-top:10px;font-weight:700;font-size:1rem;}
.orow span:last-child{font-weight:600;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g600);margin-bottom:6px;}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:8px;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--g800);background:var(--cream);outline:none;transition:border-color .2s;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent);background:#fff;}
.form-row select:disabled{opacity:.45;cursor:not-allowed;background:var(--g100);}
.form-row textarea{resize:vertical;min-height:72px;}
.form-acts{display:flex;gap:10px;margin-top:20px;}
.sub-btn{flex:1;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;}
.sub-btn:hover{background:var(--primary-dark);}
.can-btn{padding:13px 20px;background:none;border:1.5px solid var(--g200);color:var(--g600);border-radius:10px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;}
.can-btn:hover{border-color:var(--red);color:var(--red);}
.done-btn{padding:13px 32px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'Inter',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;}
.done-btn:hover{background:var(--primary-dark);}
.ref-box{background:var(--g100);border-radius:8px;padding:10px 16px;font-size:.9rem;font-weight:700;color:var(--primary);display:inline-block;margin-bottom:16px;}

/* CHECK ORDER */
.chk-ov{position:fixed;inset:0;background:rgba(15,36,68,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.chk-ov.open{display:flex;}
.chk-modal{background:#fff;border-radius:var(--rad);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:popIn .3s cubic-bezier(.34,1.4,.64,1);}
.chk-hdr{background:var(--primary);padding:20px 24px;border-radius:var(--rad) var(--rad) 0 0;display:flex;align-items:center;justify-content:space-between;}
.chk-hdr h2{font-size:1.1rem;font-weight:700;color:#fff;}
.chk-cls{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:1rem;}
.chk-body{padding:24px;}
.res-card{background:var(--g100);border-radius:10px;padding:16px;margin-bottom:16px;}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:.88rem;border-bottom:1px solid var(--g200);}
.res-row:last-child{border-bottom:none;}
.res-lbl{color:var(--g400);font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.res-val{font-weight:600;color:var(--g800);text-align:right;}
.sp{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700;}
.sp-pend{background:#FEF9C3;color:#92400E;}
.sp-paid{background:#D1FAE5;color:#065F46;}
.sp-done{background:#D1FAE5;color:#065F46;}
.sp-conf{background:#D1FAE5;color:#065F46;}
.sp-del{background:#DBEAFE;color:#1E40AF;}
.sp-can{background:#FEE2E2;color:#991B1B;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--g800);color:#fff;padding:12px 20px;border-radius:10px;font-size:.9rem;font-weight:500;z-index:500;opacity:0;transition:all .3s cubic-bezier(.34,1.4,.64,1);white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ADMIN */
.adm-ov{position:fixed;inset:0;background:rgba(10,22,40,.7);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px);}
.adm-ov.open{display:flex;}
.adm-modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.adm-hdr{background:#0f2444;padding:20px 24px;border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;}
.adm-hdr h2{font-size:1.1rem;font-weight:700;color:#fff;}
.adm-hdr span{font-size:.78rem;color:rgba(255,255,255,.5);margin-left:8px;}
.adm-cls{background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:1rem;}
.adm-body{padding:24px;}
.adm-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--g100);border-radius:10px;margin-bottom:10px;gap:12px;flex-wrap:wrap;}
.adm-ref{font-family:monospace;font-weight:700;font-size:.9rem;color:var(--primary);min-width:110px;}
.adm-info{flex:1;font-size:.85rem;color:var(--g600);min-width:120px;}
.adm-info strong{color:var(--g800);}
.adm-total{font-weight:700;font-size:.9rem;color:var(--g800);min-width:70px;text-align:right;}
.adm-sel{padding:6px 10px;border:1.5px solid var(--g200);border-radius:8px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;outline:none;background:#fff;}
.adm-sel:focus{border-color:var(--accent);}
.badge-pend{background:#FEF9C3;color:#92400E;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;}

</div>

<div class="overlay" id="prodOv" onclick="if(event.target===this)closeProduct()">

    <div id="prodContent"></div>
  </div>
</div>

<!-- CART -->

</div>

// Load live products from Google Sheet Stock tab
async function loadProducts() {
  if (!SCRIPT_URL || SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') {
    P = P_SEED; PRODUCTS_LOADED = true; renderCats(); renderMain(); return;
  }
  try {
    const resp = await fetch(SCRIPT_URL + '?action=getProducts');
    const data = await resp.json();
    if (data && data.status === 'ok' && data.products && data.products.length > 0) {
      P = data.products;
      PRODUCTS_LOADED = true;
      console.log('Products loaded from sheet: ' + P.length + ' products');
      renderCats(); renderMain();
    } else {
      // Sheet returned empty or error — use seed
      if (!PRODUCTS_LOADED) { P = P_SEED; PRODUCTS_LOADED = true; renderCats(); renderMain(); }
    }
  } catch(e) {
    console.warn('Could not load products from sheet:', e);
    if (!PRODUCTS_LOADED) { P = P_SEED; PRODUCTS_LOADED = true; renderCats(); renderMain(); }
  }
}

// Fetch student emails from Sheet on page load
async function loadStudentEmails() {
  if (!SCRIPT_URL || SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') return;
  try {
    const resp = await fetch(SCRIPT_URL + '?action=getStudents');
    const data = await resp.json();

      STUDENTS_EMAIL = data.students;

      // Sync fallback list from live data so new/removed students are reflected
      Object.keys(data.students).forEach(function(grade) {
        var names = Object.keys(data.students[grade]);
        STUDENTS_FALLBACK[grade] = names; // update even if empty, to reflect removals
      });

      console.log('Student data refreshed from sheet — ' +
        Object.keys(data.students).length + ' grades loaded.');

      // If the order form is open and a grade is already selected, refresh the name dropdown
      var gradeEl = document.getElementById('oGrade');
      if (gradeEl && gradeEl.value && gradeEl.value !== '__guest__') {
        onGradeChange();
      }
    }
  } catch(e) {
    console.warn('Could not load student emails:', e);
  }
}

// ── RENDER MAIN ──
function renderMain(){
  const main=document.getElementById('mainContent');
  const q=searchQ.toLowerCase();
  let filtered=P.filter(p=>{
    return (activeCat==='All'||p.cats.includes(activeCat))&&(!q||p.name.toLowerCase().includes(q));
  });
  if(activeCat==='All'&&!q){
    let html='';
    CATS.slice(1).forEach(function(cat){
      const items=filtered.filter(p=>p.cats.includes(cat));
      if(!items.length)return;
      html+='<div class="section"><div class="sec-head"><span class="sec-title">'+cat+'</span>'
        +'<button class="view-all" onclick="setCat(\''+cat+'\')">View all →</button></div>'
        +'<div class="pgrid">'+items.map(cardHTML).join('')+'</div></div>';
    });
    main.innerHTML=html||'';
  } else {
    const cnt=filtered.length;
    main.innerHTML='<div class="section"><div class="sec-head"><span class="sec-title">'
      +(activeCat==='All'?'Search results':activeCat)
      +' <span style="font-size:.9rem;font-weight:400;color:var(--g400);margin-left:8px">'+cnt+' item'+(cnt!==1?'s':'')+'</span>'
      +'</span></div><div class="pgrid">'
      +(cnt?filtered.map(cardHTML).join(''):'<div class="no-res"><div class="ni">🔍</div><p>No items found</p></div>')
      +'</div></div>';
  }
}

function cardHTML(p){
  const price=minP(p);
  const multi=new Set(p.sizes.map(s=>s.p)).size>1;
  const single=p.sizes.length===1;
  const inStock=hasStock(p);
  const totalStock=p.sizes.reduce(function(s,sz){return s+(Number(sz.k)||0);},0);
  const isLow=inStock&&totalStock>0&&totalStock<=5;
  const badge=!inStock?'<span class="out-badge">Out of stock</span>'
    :isLow?'<span class="low-badge">Only '+totalStock+' left</span>':'';
  const hasMultiImg=p.imgs&&p.imgs.length>1;
  const arrows=hasMultiImg
    ?'<button class="carr-btn carr-l" onclick="event.stopPropagation();cardSlide(\''+p.id+'\',-1)">&#8249;</button>'
     +'<button class="carr-btn carr-r" onclick="event.stopPropagation();cardSlide(\''+p.id+'\',1)">&#8250;</button>'
     +'<div class="carr-dots">'+p.imgs.map(function(_,i){
         return '<div class="carr-dot'+(i===0?' active':'')+'" data-cid="'+p.id+'" data-ci="'+i+'"></div>';
       }).join('')+'</div>'
    :'';
  return '<div class="pcard" onclick="openProd(\''+p.id+'\')"><div class="cimg-wrap">'
    +'<img class="cimg" id="cimg-'+p.id+'" src="'+p.img+'" alt="'+p.name+'" onerror="this.src=\''+FB+'\'">'
    +badge+arrows
    +'</div><div class="cbody"><div class="cname">'+p.name+'</div>'
    +'<div class="cprice">'+(multi?'<span class="from">'+t('from')+'</span>':'')+'฿'+fmt(price)+'</div>'
    +'<button class="see-btn">'+(single&&inStock?t('addCart'):t('seeOpts'))+'</button>'
    +'</div></div>';
}

  document.getElementById('prodContent').innerHTML=
    '<div class="mimg-wrap"><img class="mimg" id="mMainImg" src="'+p.imgs[modalImgIdx]+'" alt="'+p.name+'" onerror="this.src=\''+FB+'\'">'+mArrows+'</div>'

    +'<button class="qty-btn" onclick="chgQty(1)">+</button></div></div>'

}
function selSz(i){modalSz=i;renderProdModal();}
function chgQty(d){
  var maxStock = curProd && modalSz !== null ? (curProd.sizes[modalSz].k || 0) : 99;
  // Also account for what's already in cart for this item
  var key = curProd ? curProd.id+'||'+curProd.sizes[modalSz].s : '';
  var inCart = cart.find(function(i){return i.key===key;});
  var alreadyInCart = inCart ? inCart.qty : 0;
  var available = Math.max(0, maxStock - alreadyInCart);
  modalQty = Math.min(Math.max(1, modalQty + d), available || 1);
  renderProdModal();
}
function switchImg(i){
  if(!curProd||!curProd.imgs[i])return;
  modalImgIdx=i;
  document.getElementById('mMainImg').src=curProd.imgs[i];
  document.querySelectorAll('.thumb').forEach(function(el,j){el.classList.toggle('active',j===i);});
}
function modalSlide(dir){
  if(!curProd)return;
  const n=curProd.imgs.length;
  if(n<=1)return;
  switchImg((modalImgIdx+dir+n)%n);
}
function cardSlide(id,dir){
  const p=P.find(function(pp){return pp.id===id;});
  if(!p||!p.imgs||p.imgs.length<=1)return;
  const cur=CARD_IDX[id]||0;
  const next=(cur+dir+p.imgs.length)%p.imgs.length;
  CARD_IDX[id]=next;
  const imgEl=document.getElementById('cimg-'+id);
  if(imgEl)imgEl.src=p.imgs[next];
  document.querySelectorAll('.carr-dot[data-cid="'+id+'"]').forEach(function(d){
    d.classList.toggle('active',parseInt(d.getAttribute('data-ci'))===next);
  });
}

function addToCart(){
  const p=curProd; const s=p.sizes[modalSz];
  if(!s||s.k===0)return;
  const key=p.id+'||'+s.s;
  const ex=cart.find(i=>i.key===key);
  const alreadyInCart = ex ? ex.qty : 0;
  const available = Math.max(0, (s.k||0) - alreadyInCart);
  if(available <= 0){ showToast('⚠️ No more stock available'); return; }
  const addQty = Math.min(modalQty, available);
  if(ex){ex.qty+=addQty;}else{cart.push({key,id:p.id,name:p.name,img:p.img,size:s.s,price:s.p,qty:addQty});}
  updateCount(); closeProduct();
  showToast(addQty < modalQty ? '⚠️ Only '+addQty+' added (max stock reached)' : '✅ Added to cart');
}
function updateCount(){document.getElementById('cartCount').textContent=cart.reduce(function(s,i){return s+i.qty;},0);}
function openCart(){renderCart();document.getElementById('cartOv').classList.add('open');document.getElementById('cartDrw').classList.add('open');document.body.style.overflow='hidden';}
function closeCart(){document.getElementById('cartOv').classList.remove('open');document.getElementById('cartDrw').classList.remove('open');document.body.style.overflow='';}
function renderCart(){
  const body=document.getElementById('cartBody');
  const ftr=document.getElementById('cartFtr');
  if(!cart.length){
    body.innerHTML='<div class="cart-empty"><div class="ei">🛒</div><p>Your cart is empty</p></div>';
    ftr.style.display='none';return;
  }
  ftr.style.display='block';
  body.innerHTML=cart.map(function(item,idx){
    return '<div class="ci"><img class="ci-img" src="'+item.img+'" onerror="this.src=\''+FB+'\'">'
      +'<div class="ci-info"><div class="ci-name">'+item.name+'</div>'
      +'<div class="ci-meta">Size: '+item.size+' · ฿'+fmt(item.price)+' each</div>'
      +'<div class="ci-bot"><span class="ci-price">฿'+fmt(item.price*item.qty)+'</span>'
      +'<div class="mq"><button class="mq-btn" onclick="cQty('+idx+',-1)">−</button>'
      +'<span class="mq-n">'+item.qty+'</span>'
      +'<button class="mq-btn" onclick="cQty('+idx+',1)">+</button></div></div></div></div>';
  }).join('');
  document.getElementById('cartTotal').textContent=fmt(cart.reduce(function(s,i){return s+i.price*i.qty;},0));
}
function cQty(idx,d){
  if(d > 0){
    // Find stock for this item
    var item = cart[idx];
    var prod = P.find(function(p){return p.id===item.id;});
    var sz   = prod ? prod.sizes.find(function(s){return s.s===item.size;}) : null;
    var maxStock = sz ? (sz.k||0) : 99;
    if(item.qty >= maxStock){ showToast('⚠️ Max stock reached ('+maxStock+')'); return; }
  }
  cart[idx].qty+=d;
  if(cart[idx].qty<=0)cart.splice(idx,1);
  updateCount();renderCart();
}
function clearCart(){cart=[];updateCount();renderCart();}

function validatePhoneField(){
  var el  = document.getElementById('oPhone');
  var err = document.getElementById('oPhoneErr');
  if (!el || !err) return true;
  var val = el.value.trim();
  if (val === '') {
    el.style.borderColor = '';
    err.style.display = 'none';
    return true;
  }
  // Strip all non-digit chars, must have at least 10 digits
  var digits = val.replace(/\D/g,'');
  var valid = digits.length >= 10;
  if (valid) {
    el.style.borderColor = '#22c55e';
    err.style.display = 'none';
  } else {
    el.style.borderColor = '#ef4444';
    err.style.display = 'block';
  }
  return valid;
}

function validateEmailField(){
  var el  = document.getElementById('oEmail');
  var err = document.getElementById('oEmailErr');
  if (!el || !err) return true;
  var val = el.value.trim();
  if (val === '') {
    el.style.borderColor = '';
    err.style.display = 'none';
    return true; // empty is ok until submit
  }
  var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
  if (valid) {
    el.style.borderColor = '#22c55e';
    err.style.display = 'none';
  } else {
    el.style.borderColor = '#ef4444';
    err.style.display = 'block';
  }
  return valid;
}

    +'<p style="font-size:.88rem;">Looking up your order...</p></div>';

  // Get order details from localStorage (items, name, etc.)
  const saved = JSON.parse(localStorage.getItem('dis_orders')||'[]');
  const localOrder = saved.find(function(o){ return o.ref.toUpperCase()===ref; });

  // Fetch LIVE status from Google Sheet
  let liveStatus = null;
  if(SCRIPT_URL && SCRIPT_URL !== 'PASTE_YOUR_WEB_APP_URL_HERE'){
    try {
      const url = SCRIPT_URL + '?action=getStatus&ref=' + encodeURIComponent(ref);
      const resp = await fetch(url);
      const data = await resp.json();
      if(data && data.status === 'ok' && data.orderStatus){
        liveStatus = data.orderStatus;
        // Also update localStorage so it stays in sync
        if(localOrder) localOrder.status = liveStatus;
        localStorage.setItem('dis_orders', JSON.stringify(saved));
      }
    } catch(e){
      console.warn('Could not fetch live status:', e);
    }
  }

  if(!localOrder && !liveStatus){
    res.innerHTML='<div style="text-align:center;padding:30px 0;color:var(--g400);">'
      +'<div style="font-size:2.5rem;margin-bottom:12px;">\ud83d\udd0d</div>'
      +'<p style="font-size:.9rem;">No order found for <strong style="color:var(--g800);">'+ref+'</strong></p>'
      +'<p style="font-size:.82rem;margin-top:8px;">Check your ref from the order confirmation screen.</p></div>';
    return;
  }

  // If we have a live status but no local order (different device), show limited info
  if(!localOrder && liveStatus){
    const sc = {'Pending':'sp-pend','Paid':'sp-paid','Completed':'sp-done','Canceled':'sp-can'}[liveStatus]||'sp-pend';
    res.innerHTML='<div class="res-card" style="text-align:center;padding:20px;">'
      +'<div style="font-family:monospace;font-weight:700;font-size:1rem;color:var(--primary);margin-bottom:8px;">'+ref+'</div>'
      +'<span class="sp '+sc+'">'+liveStatus+'</span></div>';
    return;
  }

  res.innerHTML = renderOrderResult(localOrder, liveStatus);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2500);
}

// ── ADMIN PANEL ──
const ADMIN_PASS = 'dis2024'; // change this password!
let adminUnlocked = false;

function openAdmin(){
  document.getElementById('admOv').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('admContent').innerHTML='';
  if(adminUnlocked) renderAdminOrders();
}
function closeAdmin(){
  document.getElementById('admOv').classList.remove('open');
  document.body.style.overflow='';
}
function adminLogin(){
  const pass = document.getElementById('admPass').value;
  if(pass === ADMIN_PASS){
    adminUnlocked = true;
    document.getElementById('admPass').closest('div').style.display='none';
    renderAdminOrders();
  } else {
    showToast('⚠️ Wrong password');
  }
}
function renderAdminOrders(){
  const orders = JSON.parse(localStorage.getItem('dis_orders')||'[]').slice().reverse();
  const el = document.getElementById('admContent');
  if(!orders.length){
    el.innerHTML='<p style="text-align:center;color:var(--g400);padding:40px 0;">No orders yet.</p>';
    return;
  }
  const badgeClass = {'Pending':'badge-pend','Paid':'badge-paid','Completed':'badge-done','Canceled':'badge-can'};
  el.innerHTML = '<div style="font-size:.78rem;font-weight:600;color:var(--g400);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;">'
    + orders.length + ' order' + (orders.length!==1?'s':'') + ' total</div>'
    + orders.map(function(o, i){
      const realIdx = orders.length - 1 - i; // since we reversed
      const bc = badgeClass[o.status]||'badge-pend';
      const itemSummary = o.items.map(function(it){return it.name+' ×'+it.qty;}).join(', ');
      return '<div class="adm-row">'
        + '<div class="adm-ref">'+o.ref+'</div>'
        + '<div class="adm-info"><strong>'+o.name+'</strong> · '+o.classId+'<br>'+(o.email?'<span style="font-size:.78rem;color:var(--g600);">'+o.email+'</span><br>':'')
        + '<span style="font-size:.78rem;color:var(--g400);">'+o.datetime+'</span><br>'
        + '<span style="font-size:.78rem;">'+itemSummary+'</span></div>'
        + '<div class="adm-total">฿'+fmt(o.total)+'</div>'
        + '<select class="adm-sel" onchange="updateStatus(\'' + o.ref + '\',this.value)">'
        + ['Pending','Paid','Completed','Canceled'].map(function(st){
            return '<option value="'+st+'"'+(o.status===st?' selected':'')+'>'+st+'</option>';
          }).join('')
        + '</select>'
        + '<button onclick="removeOrder(\''+o.ref+'\')" style="background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;padding:5px 10px;border-radius:6px;font-family:Inter,sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;">🗑 Remove</button>'
        + '</div>';
    }).join('');
}
function updateStatus(ref, newStatus){
  const orders = JSON.parse(localStorage.getItem('dis_orders')||'[]');
  const idx = orders.findIndex(function(o){return o.ref===ref;});
  if(idx===-1) return;
  orders[idx].status = newStatus;
  localStorage.setItem('dis_orders', JSON.stringify(orders));
  showToast('✅ '+ref+' → '+newStatus);
  renderAdminOrders();
}

function removeOrder(ref){
  if(!confirm('Remove order '+ref+' from this device?\nNote: this only removes it from this browser, not from Google Sheets.')) return;
  const orders = JSON.parse(localStorage.getItem('dis_orders')||'[]');
  const filtered = orders.filter(function(o){return o.ref !== ref;});
  localStorage.setItem('dis_orders', JSON.stringify(filtered));
  showToast('🗑 Order '+ref+' removed');
  renderAdminOrders();
}
